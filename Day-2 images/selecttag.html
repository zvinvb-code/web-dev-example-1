<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- select tag -->
    <!-- select - choosing something from options -->

    <select>
        <option>India</option>
        <!-- by default selects the first option -->

        <option disabled>Russia</option>

        <option>Germany</option>

        <option label="USA">United States of America</option>

        <option>France</option>

        <option selected disabled>Countries</option>
    </select>


    <select>
        <option>Electronics</option>
        <option>Clothing</option>
        <option>kids</option>
        <option selected disabled> Category</option>
    </select>
</body>

</html>
