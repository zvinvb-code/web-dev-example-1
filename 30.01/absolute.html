<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* parent */
        .container {
            position: relative;
            /* for the parent, inner child element are free to move*/
            background-color: lightgreen;
            width: 100%;
            height: 100vh;
            /* the screen size vh*/


        }

        /* child */
        .gold {
            position: absolute;
            /* child is free to move inside the parent*/
            background: gold;
            bottom: 20px;
            right: 20px;
            /* gold in the centre of the screen */
            height: 80px;
            width: 80px;
            border-radius: 50%;

        }
    </style>
</head>

<body>

    <!-- absolute position: used when you want to move an inner element -->
    <div class="container">
        <div class="gold">hello</div>
    </div>
</body>

</html>
