<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .guard {
            width: 100px;
            height: 100px;
            background: forestgreen;
            position: fixed;

            top: 50%;
            left: 50%;
            /* bottom: 20px;
            right: 20px; */
            /* fixed is taking the entire web page */

            border-radius: 50%;


        }
    </style>


</head>

<body>
    <h2>Fixed Position - Cannot move after it's fixed</h2>

    <div class="guard"></div>

    <div style="height: 1500px; background-color: lightskyblue;">scroll down</div>

</body>

</html>
