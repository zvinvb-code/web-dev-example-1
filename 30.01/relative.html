<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            background: aquamarine;
            height: 100px;
            width: 100px;
            position: relative;
            /* direction to move */
            left: 200px;
            /* the div box moves in right direction OR 
            moving in opposite direction OR 
            moves from left to right 
            (value is put in the left part)
            */
            top: 300px;
            /* down OR 
            moving in opposite direction */
        }
    </style>
</head>

<body>
    <h2>Relative Example - Leaning Students</h2>
    <!-- cannot move outside the bench -->

    <div class="box">Leaning Students </div>

</body>

</html>
