<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            background: lightblue;
            margin: 10px;
            position: static;
            /* default no change */

        }
    </style>
</head>

<body>
    <!-- position : moving from one place to another
     static - by default cannot move
     
     relative - can move tags in 4 directions (top,left,right,bottom)
     
     fixed - cannot move
     -->


    <h2>Static Positioning Example: Students in Seat</h2>
    <div class="box">Student 1</div>
    <div class="box">Student 2</div>
    <div class="box">Student 3</div>

</body>

</html>
