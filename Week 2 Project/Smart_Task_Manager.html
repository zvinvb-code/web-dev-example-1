<!DOCTYPE html>
<html>

<head>
    <title>Smart Task Manager</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #9face6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.4s;
        }

        .container {
            width: 400px;
            padding: 25px;
            border-radius: 20px;
            background: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: 0.4s;
            position: relative;
        }

        h2 {
            text-align: center;
        }

        .toggle-btn {
            position: absolute;
            right: 15px;
            top: 15px;
            cursor: pointer;
            font-size: 20px;
            background: none;
            border: none;
        }

        .input-section {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid gray;
        }

        button {
            padding: 8px 12px;
            border: none;
            background: #6c63ff;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #5548e5;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }

        li {
            background: #f1f1f1;
            padding: 8px;
            margin-top: 5px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }

        .delete {
            background: red;
            font-size: 12px;
            padding: 4px 8px;
        }

        /* 🌙 DARK MODE */

        .dark {
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
        }

        .dark .container {
            background: #2d3748;
        }

        .dark li {
            background: #4a5568;
        }
    </style>
</head>

<body>

    <div class="container">

        <button class="toggle-btn" id="modeBtn">🌙</button>

        <h2>Smart Task Manager</h2>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter task">
            <button id="addBtn">Add</button>
        </div>

        <p id="message"></p>

        <ul id="taskList"></ul>

        <p>Total Tasks: <span id="total">0</span></p>

    </div>

    <script>

        let tasks = [];

        let input = document.getElementById("taskInput");
        let addBtn = document.getElementById("addBtn");
        let list = document.getElementById("taskList");
        let total = document.getElementById("total");
        let message = document.getElementById("message");
        let modeBtn = document.getElementById("modeBtn");
        let body = document.body;

        // Add Task
        addBtn.addEventListener("click", function () {

            let value = input.value;

            if (value === "") {
                message.innerHTML = "Please enter a task!";
                return;
            }

            tasks.push(value);
            input.value = "";
            message.innerHTML = "";

            displayTasks();
        });

        function displayTasks() {

            list.innerHTML = "";

            for (let i = 0; i < tasks.length; i++) {

                let li = document.createElement("li");

                let span = document.createElement("span");
                span.innerHTML = tasks[i];

                span.addEventListener("click", function () {
                    span.classList.toggle("completed");
                });

                let delBtn = document.createElement("button");
                delBtn.innerHTML = "Delete";
                delBtn.classList.add("delete");

                delBtn.addEventListener("click", function () {
                    tasks.splice(i, 1);
                    displayTasks();
                });

                li.appendChild(span);
                li.appendChild(delBtn);
                list.appendChild(li);
            }

            total.innerHTML = tasks.length;

            if (tasks.length === 0) {
                message.innerHTML = "Task list is empty!";
            }
        }

        // 🌙 Toggle Mode
        modeBtn.addEventListener("click", function () {

            body.classList.toggle("dark");

            // Change emoji
            if (body.classList.contains("dark")) {
                modeBtn.innerHTML = "☀️";
            } else {
                modeBtn.innerHTML = "🌙";
            }

        });

    </script>

</body>

</html>
