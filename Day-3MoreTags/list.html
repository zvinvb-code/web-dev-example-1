<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- Ordered List- ol -->
    <!-- li- List -->

    <ol type="a">
        <li>Pizza</li>
        <li>Burger</li>
        <li>Dessert</li>
        <li>Drinks</li>
    </ol>

    <!-- Unordered List - ul -->

    <ul type="disk">
        <li>Pizza</li>
        <li>Burger</li>
        <li>Dessert</li>
        <li>Drinks</li>
    </ul>

    <!-- removing -->
    <ul style="list-style: none; color: red">
        <li>Pizza</li>
        <li>Burger</li>
        <li>Dessert</li>
        <li>Drinks</li>
    </ul>

</body>

</html>
