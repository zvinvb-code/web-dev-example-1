        //fetch("Api Address") - Fetch data from that API address


        //.then () -> successful output if eveything is working
        //.catch () -> unsuccessful output -> output is not working 

        // json - js object notation format is key value pair and is human readable
        // convert response into json format and then use the data

        fetch("https://randomuser.me/api")

            // convert to json format
            // json() - convert api response in human readable form

            .then(response => response.json())

            .then(data => console.log(data))

            .catch(error => console.log("error connection to API", error))
