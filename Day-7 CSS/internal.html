<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* clear understanding of where the css code starts and from where the html code starts  */
        p {
            color: brown;
            font-family: monospace;
            font-style: italic;
        }

        div {
            text-align: center;
            background-color: beige;
            /* exactly know how big is the div container*/
            width: 230px;
        }
    </style>

</head>

<body>
    <!-- internal css: special tag <style> tag, written inside <head>: provides info about website -->
    <div>
        <h1>Headphone</h1>
        <img
            src="https://d57avc95tvxyg.cloudfront.net/images/thumbnails/400/400/detailed/1071/earphone-for-tag-heuer-meridiist-jewellery-light-diamonds-handsfree-in-ear-headphone-white-maxbhi-1-6-1.jpg?t=1732442693">
        <p>Headphone is good for listening songs ⭐</p>
    </div>

</body>

</html>

<!-- priority is given to inline CSS, it can overide properties of internal CSS -->
