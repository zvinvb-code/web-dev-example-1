    <script>
        //main task -> is to place order of pizza
        //one more task -> 

        function OrderPizza(name) {
            //ouput - in the form of promise

            return new Promise((resolve, reject) => {

                let PizzaReady = false;

                console.log(`Order Placed for ${name}`)


                setTimeout(() => {
                    if (PizzaReady) {
                        resolve("Pizza got delivered")
                    }

                    else {
                        reject("Order cancelled")
                    }

                }, 5000)

            })

        }

        OrderPizza("Zainab")

            .then(message => {
                console.log(message)

            })

            .catch(err => {
                console.log(err)

            })

    </script>
